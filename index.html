<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 수학 키워드 </title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  color: #fff;
  font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
  overflow: hidden;
  height: 100vh;
  display: flex;
}

/* ── 로딩 오버레이 ── */
#loading-overlay {
  position: fixed; inset: 0; z-index: 999;
  background: #0a0a1a;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px;
  transition: opacity 0.6s ease;
}
#loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(168,85,247,0.2);
  border-top-color: #a855f7;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-overlay p { font-size: 13px; color: #666; }

/* ── 업데이트 배지 ── */
#update-badge {
  position: absolute; top: 20px; right: 16px;
  z-index: 10; font-size: 10px; color: #555;
  background: rgba(255,255,255,0.04);
  padding: 4px 10px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.07);
}

#sphere-panel {
  flex: 1; position: relative;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
#starfield { position: absolute; top:0; left:0; width:100%; height:100%; z-index:0; }
#sphere-canvas { position: relative; z-index: 1; cursor: grab; }
#sphere-canvas:active { cursor: grabbing; }
#sphere-title {
  position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  z-index: 10; text-align: center; white-space: nowrap;
}
#sphere-title h1 {
  font-size: 22px;
  background: linear-gradient(90deg,#a855f7,#06b6d4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
#legend {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 10; display: flex; gap: 20px;
  background: rgba(255,255,255,0.05);
  padding: 8px 20px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
}
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.dot { width: 10px; height: 10px; border-radius: 50%; }
#tooltip {
  position: fixed;
  background: rgba(10,10,30,0.95);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px; padding: 10px 14px;
  pointer-events: none; z-index: 100;
  display: none; max-width: 240px;
  font-size: 12px; line-height: 1.7;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#mining-panel {
  width: 320px;
  background: rgba(255,255,255,0.03);
  border-left: 1px solid rgba(255,255,255,0.08);
  display: flex; flex-direction: column;
  overflow-y: auto; z-index: 2;
}
#mining-panel::-webkit-scrollbar { width: 4px; }
#mining-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.panel-section {
  padding: 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.panel-section h3 {
  font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: 1.5px;
  margin-bottom: 12px;
}
.score-num {
  font-size: 36px; font-weight: 700;
  background: linear-gradient(90deg,#f59e0b,#ef4444);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.score-sub { font-size: 11px; color: #666; margin-top: 2px; }
.bar-bg { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 10px; }
.bar-fill {
  height: 8px;
  background: linear-gradient(90deg,#f59e0b,#ef4444);
  border-radius: 4px; width: 0%;
  transition: width 1.5s cubic-bezier(0.4,0,0.2,1);
}
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-card {
  background: rgba(255,255,255,0.05); border-radius: 10px;
  padding: 12px; text-align: center;
  border: 1px solid rgba(255,255,255,0.06);
}
.stat-num { font-size: 22px; font-weight: 700; }
.stat-label { font-size: 10px; color: #888; margin-top: 3px; }
.freq-item { margin-bottom: 9px; }
.freq-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
.freq-bar-bg { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
.freq-bar-fill { height: 6px; border-radius: 3px; transition: width 1.5s ease; }
#donut-canvas { display: block; margin: 0 auto; }
.donut-legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 10px; font-size: 11px; }
.priority-item {
  display: flex; align-items: flex-start; gap: 10px;
  margin-bottom: 8px; padding: 10px;
  background: rgba(255,255,255,0.03); border-radius: 10px;
  border-left: 3px solid; cursor: pointer;
  transition: background 0.2s;
}
.priority-item:hover { background: rgba(255,255,255,0.08); }
.priority-rank { font-size: 20px; font-weight: 700; line-height: 1.2; min-width: 20px; }
.priority-info h4 { font-size: 13px; margin-bottom: 3px; }
.priority-info p { font-size: 10px; color: #888; line-height: 1.4; }

/* ── DB 행 테이블 ── */
.db-row-table {
  width: 100%; border-collapse: collapse; font-size: 11px;
}
.db-row-table th {
  color: #666; font-weight: 500; text-align: left;
  padding: 4px 6px; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.db-row-table td {
  padding: 7px 6px; border-bottom: 1px solid rgba(255,255,255,0.04);
  vertical-align: middle;
}
.db-row-table tr:last-child td { border-bottom: none; }
.type-badge {
  display: inline-block; padding: 2px 8px; border-radius: 20px;
  font-size: 10px; font-weight: 600;
}
.avg-bar-bg { height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; margin-top: 4px; }
.avg-bar-fill { height: 5px; border-radius: 3px; transition: width 1.2s ease; }
</style>
</head>
<body>

<!-- 로딩 오버레이 -->
<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <p>데이터 불러오는 중…</p>
</div>

<div id="sphere-panel">
  <canvas id="starfield"></canvas>
  <div id="sphere-title">
    <h1 id="page-title">📊 수학 키워드 데이터 마이닝</h1>
  </div>
  <canvas id="sphere-canvas" width="640" height="520"></canvas>
  <div id="legend">
    <div class="legend-item"><div class="dot" style="background:#ff2d55"></div><span>취약</span></div>
    <div class="legend-item"><div class="dot" style="background:#ffd60a"></div><span>보통</span></div>
    <div class="legend-item"><div class="dot" style="background:#2ed573"></div><span>강점</span></div>
  </div>
  <div id="update-badge">⏱ 로딩 중…</div>
</div>

<div id="mining-panel">
  <!-- 현재 성적 -->
  <div class="panel-section">
    <h3>📈 현재 성적</h3>
    <div class="score-num"><span id="score-val">—</span><span style="font-size:18px;color:#888">점</span></div>
    <div class="score-sub" id="score-sub">데이터 로딩 중</div>
    <div class="bar-bg"><div class="bar-fill" id="score-fill"></div></div>
  </div>

  <!-- 통계 -->
  <div class="panel-section">
    <h3>📊 통계</h3>
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="stat-num" style="color:#555">—</div><div class="stat-label">취약 단원</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#555">—</div><div class="stat-label">강점 단원</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#555">—</div><div class="stat-label">총 문제 수</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#555">—</div><div class="stat-label">학습 단원</div></div>
    </div>
  </div>

  <!-- DB 행 요약 -->
  <div class="panel-section">
    <h3>🗃 DB 단원별 현황</h3>
    <table class="db-row-table" id="db-table">
      <thead>
        <tr>
          <th>단원</th>
          <th>정답률</th>
          <th>오답</th>
        </tr>
      </thead>
      <tbody id="db-table-body"></tbody>
    </table>
  </div>

  <!-- 오답 빈도 -->
  <div class="panel-section">
    <h3>📉 오답 빈도 분석</h3>
    <div id="freq-chart"></div>
  </div>

  <!-- 단원별 분포 도넛 -->
  <div class="panel-section">
    <h3>🍩 단원별 분포</h3>
    <canvas id="donut-canvas" width="180" height="180"></canvas>
    <div class="donut-legend" id="donut-legend"></div>
  </div>

  <!-- 우선 학습 -->
  <div class="panel-section">
    <h3>🎯 우선 학습 단원</h3>
    <div id="priority-list"></div>
  </div>
</div>

<div id="tooltip"></div>

<script>
// ══════════════════════════════════════════════════════════
//  데이터 소스 설정
const DATA_URL = './data.json';
// ══════════════════════════════════════════════════════════

let KEYWORDS = [];   // 구(球)에 표시될 키워드 배열
let NOTION   = {};   // 노션 링크 맵
let DB_ROWS  = [];   // 원본 DB 행 (Notion DB 컬럼 그대로)
let META     = {};   // 동적 계산된 메타

// ── Notion DB 컬럼 → 구 키워드 매핑 ──────────────────────
function mapRowToKeyword(row, maxWeight) {
  // Type 정규화
  const typeNorm = row.Type === 'strong' ? 'strong'
                 : row.Type === 'weak'   ? 'weak'
                 : 'yellow';  // 진행 중, 완료, yellow 등

  // Color: DB에 있으면 사용, 없으면 Type 기준 기본색
  const color = (row.Color && row.Color.trim())
    ? row.Color.trim()
    : typeNorm === 'strong' ? '#2ed573'
    : typeNorm === 'weak'   ? '#ff2d55'
    : '#ffd60a';

  // Weight → 구 텍스트 크기 w (2~5)
  const w = Math.max(2, Math.min(5, Math.round((row.Weight / maxWeight) * 4) + 1));

  // Unit: 배열이면 첫 번째
  const unit = Array.isArray(row.Unit) ? row.Unit[0] : (row.Unit || '');

  // link: 취약/보통 → weakness 페이지, 강점 → problems 페이지
  const link = typeNorm === 'strong' ? 'problems' : 'weakness';

  // tip: avg_value 기반 자동 생성
  const tip = `정답률 ${row.avg_value}% · 오답 ${row.Mistakes}회`;

  return {
    t:        row.Name,           // 표시 텍스트
    type:     typeNorm,           // weak | strong | yellow
    w,                            // 크기 가중치 (2~5)
    c:        color,              // 색상
    link,                         // notionLinks 키
    unit,                         // 단원명
    mistakes: row.Mistakes  || 0, // 오답 수
    correct:  row.Correct   || 0, // 정답 수
    avg_value:row.avg_value || 0, // 정답률 %
    tip,                          // 툴팁 설명
    url: null                     // loadData에서 NOTION 설정 후 채움
  };
}

// ── 데이터 로드 ───────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    // ① 노션 링크 맵
    NOTION  = data.notionLinks;

    // ② DB 행 보존
    DB_ROWS = data.dbRows || [];

    // ③ Weight 최댓값 (상대적 크기 계산용)
    const maxWeight = Math.max(...DB_ROWS.map(r => r.Weight || 1), 1);

    // ④ DB 컬럼 → 구 키워드 변환
    KEYWORDS = DB_ROWS.map(row => {
      const kw = mapRowToKeyword(row, maxWeight);
      kw.url = NOTION[kw.link] || NOTION.problems;
      return kw;
    });

    // ⑤ Meta 동적 계산 (DB 행 합산)
    const totalQ   = DB_ROWS.reduce((s, r) => s + (r.Mistakes || 0) + (r.Correct || 0), 0);
    const correctQ = DB_ROWS.reduce((s, r) => s + (r.Correct  || 0), 0);
    const scoreVal = totalQ > 0 ? Math.round(correctQ / totalQ * 100) : 0;
    META = {
      title:     data.meta?.title || '수학 키워드 데이터 마이닝',
      total:     totalQ,
      correct:   correctQ,
      score:     scoreVal,
      updatedAt: data.meta?.updatedAt || new Date().toISOString()
    };

    // ⑥ 데이터 전달 검증 로그
    validateData();

    // ⑦ 렌더
    renderAll();

    // 업데이트 배지
    document.getElementById('update-badge').textContent =
      '🔄 ' + new Date(META.updatedAt).toLocaleDateString('ko-KR', {
        month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'
      }) + ' 업데이트';

  } catch (err) {
    console.error('데이터 로드 실패:', err);
    document.querySelector('#loading-overlay p').textContent =
      '⚠️ data.json 로드 실패. 콘솔을 확인하세요.';
    return;
  }

  document.getElementById('loading-overlay').classList.add('hidden');
  initStars(); drawStars();
  initSphere();
}

// ── 데이터 전달 검증 ─────────────────────────────────────
function validateData() {
  const requiredCols = ['Name','Type','Unit','Mistakes','Correct','Weight','Color','avg_value'];
  const issues = [];

  DB_ROWS.forEach((row, i) => {
    requiredCols.forEach(col => {
      if (row[col] === undefined || row[col] === null || row[col] === '') {
        issues.push(`Row[${i}].${col} 누락`);
      }
    });
  });

  KEYWORDS.forEach((kw, i) => {
    ['t','type','w','c','unit','mistakes','correct','tip','url'].forEach(f => {
      if (kw[f] === undefined || kw[f] === null || kw[f] === '') {
        issues.push(`KEYWORD[${i}].${f} 미매핑`);
      }
    });
  });

  if (issues.length === 0) {
    console.log('✅ 데이터 전달 검증 OK —', KEYWORDS.length, '개 키워드, META:', META);
  } else {
    console.warn('⚠️ 데이터 검증 이슈:', issues);
  }
}

// ── 전체 렌더 ────────────────────────────────────────────
function renderAll() {
  const weakKWs   = KEYWORDS.filter(k => k.type !== 'strong');
  const strongKWs = KEYWORDS.filter(k => k.type === 'strong');
  const units     = [...new Set(KEYWORDS.flatMap(k => {
    const row = DB_ROWS.find(r => r.Name === k.t);
    return row ? (Array.isArray(row.Unit) ? row.Unit : [row.Unit]) : [k.unit];
  }))];

  // 성적
  document.getElementById('score-val').textContent = META.score;
  document.getElementById('score-sub').textContent =
    `${META.total}문제 중 ${META.correct}문제 정답`;
  setTimeout(() => {
    document.getElementById('score-fill').style.width = META.score + '%';
  }, 300);

  // 통계 카드
  const colors = ['#ff2d55','#2ed573','#fff','#a855f7'];
  const vals   = [weakKWs.length, strongKWs.length, META.total, units.length];
  const labels = ['취약 단원','강점 단원','총 문제 수','학습 단원'];
  document.getElementById('stats-grid').innerHTML = vals.map((v,i) => `
    <div class="stat-card">
      <div class="stat-num" style="color:${colors[i]}">${v}</div>
      <div class="stat-label">${labels[i]}</div>
    </div>`).join('');

  // DB 행 테이블 (Notion DB 컬럼 반영)
  const tbody = document.getElementById('db-table-body');
  tbody.innerHTML = DB_ROWS.map(row => {
    const typeColor = row.Type === 'strong' ? '#2ed573'
                    : row.Type === 'weak'   ? '#ff2d55'
                    : '#ffd60a';
    const typeBg = row.Type === 'strong' ? 'rgba(46,213,115,0.15)'
                 : row.Type === 'weak'   ? 'rgba(255,45,85,0.15)'
                 : 'rgba(255,214,10,0.15)';
    const unitStr = Array.isArray(row.Unit) ? row.Unit.join(', ') : row.Unit;
    return `
      <tr>
        <td>
          <div style="font-weight:600;font-size:12px">${row.Name}</div>
          <div style="font-size:10px;color:#666;margin-top:1px">${unitStr}</div>
        </td>
        <td>
          <div style="font-size:12px;font-weight:700;color:${typeColor}">${row.avg_value}%</div>
          <div class="avg-bar-bg">
            <div class="avg-bar-fill" style="width:0%;background:${typeColor}"
                 data-w="${row.avg_value}"></div>
          </div>
        </td>
        <td style="text-align:center">
          <span class="type-badge" style="color:${typeColor};background:${typeBg}">
            ${row.Mistakes}회
          </span>
        </td>
      </tr>`;
  }).join('');
  // 막대 애니메이션
  setTimeout(() => {
    document.querySelectorAll('.avg-bar-fill').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  }, 400);

  // 오답 빈도 차트
  const sorted = [...KEYWORDS]
    .filter(k => k.mistakes > 0)
    .sort((a,b) => b.mistakes - a.mistakes);
  const maxM = sorted[0]?.mistakes || 1;
  document.getElementById('freq-chart').innerHTML = sorted.map(k => {
    const pct = (k.mistakes / maxM) * 100;
    const clr = k.mistakes >= 5 ? '#ff2d55' : k.mistakes >= 3 ? '#ff6b35' : '#ff9f0a';
    return `
      <div class="freq-item">
        <div class="freq-label">
          <span>${k.t}</span>
          <span style="color:${clr}">${k.mistakes}회</span>
        </div>
        <div class="freq-bar-bg">
          <div class="freq-bar-fill" style="width:0%;background:${clr}" data-w="${pct}"></div>
        </div>
      </div>`;
  }).join('');
  setTimeout(() => {
    document.querySelectorAll('.freq-bar-fill').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  }, 400);

  // 도넛 차트 (DB Unit 컬럼 기준)
  const unitColors = ['#a855f7','#06b6d4','#f59e0b','#2ed573','#ff6b35'];
  const unitCounts = {};
  DB_ROWS.forEach(row => {
    const us = Array.isArray(row.Unit) ? row.Unit : [row.Unit];
    us.forEach(u => { unitCounts[u] = (unitCounts[u] || 0) + (row.Mistakes + row.Correct); });
  });
  const totalProbQ = Object.values(unitCounts).reduce((s,v)=>s+v,0);
  const donutData = Object.entries(unitCounts).map(([name, count], i) => ({
    name, v: count / totalProbQ, c: unitColors[i % unitColors.length]
  }));

  const dc = document.getElementById('donut-canvas').getContext('2d');
  let da = -Math.PI / 2;
  donutData.forEach(d => {
    const end = da + d.v * Math.PI * 2;
    dc.beginPath();
    dc.arc(90, 90, 72, da, end);
    dc.arc(90, 90, 48, end, da, true);
    dc.closePath(); dc.fillStyle = d.c; dc.fill();
    da = end;
  });
  dc.font = 'bold 20px Segoe UI'; dc.fillStyle = '#fff';
  dc.textAlign = 'center'; dc.textBaseline = 'middle';
  dc.fillText(Object.keys(unitCounts).length, 90, 84);
  dc.font = '11px Segoe UI'; dc.fillStyle = '#888';
  dc.fillText('단원', 90, 104);

  document.getElementById('donut-legend').innerHTML = donutData.map(d =>
    `<div class="legend-item">
      <div class="dot" style="background:${d.c}"></div>
      <span>${d.name} ${Math.round(d.v*100)}%</span>
    </div>`
  ).join('');

  // 우선 학습 (오답 많은 순)
  const top = [...KEYWORDS].sort((a,b) => b.mistakes - a.mistakes).slice(0, 3);
  const rankClrs = ['#ff2d55','#ff6b35','#ff9f0a'];
  const pl = document.getElementById('priority-list');
  pl.innerHTML = '';
  top.forEach((k, i) => {
    const div = document.createElement('div');
    div.className = 'priority-item';
    div.style.borderColor = rankClrs[i];
    div.innerHTML = `
      <div class="priority-rank" style="color:${rankClrs[i]}">${i+1}</div>
      <div class="priority-info">
        <h4>${k.t}</h4>
        <p>오답 ${k.mistakes}회 &middot; 정답률 ${k.avg_value}%</p>
      </div>`;
    div.addEventListener('click', () => window.open(k.url, '_blank'));
    pl.appendChild(div);
  });
}

// ─── 별빛 배경 ────────────────────────────────────────────
const sCanvas = document.getElementById('starfield');
const sCtx = sCanvas.getContext('2d');
let stars = [];
function initStars() {
  sCanvas.width  = sCanvas.parentElement.clientWidth;
  sCanvas.height = sCanvas.parentElement.clientHeight;
  stars = Array.from({length: 200}, () => ({
    x: Math.random() * sCanvas.width,
    y: Math.random() * sCanvas.height,
    r: Math.random() * 1.5 + 0.2,
    s: Math.random() * 0.4 + 0.1,
    a: Math.random() * Math.PI * 2
  }));
}
function drawStars() {
  sCtx.fillStyle = '#0a0a1a';
  sCtx.fillRect(0, 0, sCanvas.width, sCanvas.height);
  stars.forEach(s => {
    s.a += 0.008;
    const alpha = 0.2 + 0.8 * Math.abs(Math.sin(s.a));
    sCtx.beginPath();
    sCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sCtx.fillStyle = `rgba(255,255,255,${alpha})`;
    sCtx.fill();
    s.y -= s.s;
    if (s.y < 0) { s.y = sCanvas.height; s.x = Math.random() * sCanvas.width; }
  });
  requestAnimationFrame(drawStars);
}
window.addEventListener('resize', initStars);

// ─── 3D 구 태그 클라우드 ─────────────────────────────────
function initSphere() {
  const canvas = document.getElementById('sphere-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const CX = W / 2, CY = H / 2;
  const RADIUS = 195;

  let rotX = 0.25, angleY = 0;
  const autoSpeed = 0.005;
  let dragging = false, lastMX = 0, lastMY = 0;
  let paused = false, hoverIdx = -1;
  let zoom = 1.0;

  function fibSphere(n) {
    const pts = [], phi = Math.PI * (3 - Math.sqrt(5));
    for (let i = 0; i < n; i++) {
      const y = 1 - (i / (n - 1)) * 2;
      const r = Math.sqrt(1 - y * y);
      const th = phi * i;
      pts.push([Math.cos(th) * r, y, Math.sin(th) * r]);
    }
    return pts;
  }
  const basePos = fibSphere(Math.max(KEYWORDS.length, 8));

  function rotY(p, a) { const c=Math.cos(a),s=Math.sin(a); return [p[0]*c+p[2]*s, p[1], -p[0]*s+p[2]*c]; }
  function rotX2(p, a) { const c=Math.cos(a),s=Math.sin(a); return [p[0], p[1]*c-p[2]*s, p[1]*s+p[2]*c]; }
  function project(p) {
    const fov = 520 * zoom;
    const z = p[2] * RADIUS;
    const d = fov / (fov + z + RADIUS * 1.2);
    return { x: CX + p[0]*RADIUS*d, y: CY - p[1]*RADIUS*d, z: p[2], d };
  }

  let _pts = [];
  function frame() {
    ctx.clearRect(0, 0, W, H);
    const grd = ctx.createRadialGradient(CX,CY,20, CX,CY,RADIUS);
    grd.addColorStop(0,'rgba(168,85,247,0.10)');
    grd.addColorStop(1,'rgba(168,85,247,0)');
    ctx.beginPath(); ctx.arc(CX,CY,RADIUS,0,Math.PI*2);
    ctx.fillStyle = grd; ctx.fill();

    if (!paused) { angleY += autoSpeed; }

    _pts = KEYWORDS.map((_, i) => { const p = basePos[i % basePos.length];
      let q = rotY(p, angleY);
      q = rotX2(q, rotX);
      return project(q);
    });

    const order = KEYWORDS.map((_,i)=>i).sort((a,b) => _pts[a].z - _pts[b].z);

    // 연결선
    ctx.lineWidth = 0.3;
    for (let i = 0; i < order.length; i++) {
      for (let j = i + 1; j < order.length; j++) {
        const pa = _pts[order[i]], pb = _pts[order[j]];
        const dist = Math.hypot(pa.x-pb.x, pa.y-pb.y);
        if (dist < 160) {
          const va = (pa.z+1)/2, vb = (pb.z+1)/2;
          const alpha = (1-dist/160) * 0.2 * va * vb;
          ctx.strokeStyle = `rgba(200,200,255,${alpha})`;
          ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
        }
      }
    }

    order.forEach(i => {
      const kw = KEYWORDS[i], p = _pts[i];
      const vis  = (p.z + 1) / 2;
      const fs   = Math.round((kw.w * 5 + 10) * p.d * zoom);
      const alpha = 0.3 + 0.7 * vis;
      const isHov = (i === hoverIdx);
      ctx.save();
      ctx.font = `bold ${fs}px 'Segoe UI', sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.globalAlpha = alpha;
      if (isHov || vis > 0.65) { ctx.shadowColor = kw.c; ctx.shadowBlur = isHov ? 28 : 14; }
      ctx.fillStyle = kw.c;
      ctx.fillText(kw.t, p.x, p.y);
      if (isHov) {
        ctx.shadowBlur = 0;
        ctx.font = `11px 'Segoe UI', sans-serif`;
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        ctx.globalAlpha = 1;
        const typeLabel = kw.type === 'strong' ? '✓ 강점' : kw.type === 'yellow' ? '△ 보통' : '⚠ 취약';
        ctx.fillText(typeLabel, p.x, p.y + fs/2 + 12);
      }
      ctx.restore();
    });

    requestAnimationFrame(frame);
  }
  frame();

  canvas.addEventListener('mousedown', e => { dragging = true; lastMX = e.clientX; lastMY = e.clientY; });
  window.addEventListener('mouseup', () => { dragging = false; });
  window.addEventListener('mousemove', e => {
    if (dragging) {
      angleY += (e.clientX - lastMX) * 0.012;
      rotX   += (e.clientY - lastMY) * 0.012;
      lastMX = e.clientX; lastMY = e.clientY;
      return;
    }
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    let found = -1, minD = Infinity;
    _pts.forEach((p, i) => {
      const fs = Math.round((KEYWORDS[i].w*5+10) * p.d * zoom);
      const d = Math.hypot(p.x - mx, p.y - my);
      if (d < fs + 6 && d < minD) { minD = d; found = i; }
    });
    hoverIdx = found; paused = (found >= 0);
    canvas.style.cursor = found >= 0 ? 'pointer' : 'grab';
    const tt = document.getElementById('tooltip');
    if (found >= 0) {
      const kw = KEYWORDS[found];
      const row = DB_ROWS[found];
      const typeLabel = kw.type === 'strong'
        ? `<b style="color:#2ed573">✓ 강점 단원</b>`
        : kw.type === 'yellow'
        ? `<b style="color:#ffd60a">△ 보통 단원</b>`
        : `<b style="color:#ff2d55">⚠ 취약 단원</b>`;
      const unitStr = row ? (Array.isArray(row.Unit) ? row.Unit.join(', ') : row.Unit) : kw.unit;
      tt.innerHTML = `
        <div style="font-size:14px;font-weight:700;margin-bottom:6px">${kw.t}</div>
        <div>${typeLabel} &nbsp; 정답률 <b>${kw.avg_value}%</b></div>
        <div style="color:#aaa;margin-top:3px">단원: ${unitStr}</div>
        <div style="margin-top:4px">
          <span style="color:#2ed573">정답 ${kw.correct}문제</span>
          &nbsp;/&nbsp;
          <span style="color:#ff2d55">오답 ${kw.mistakes}문제</span>
        </div>
        <div style="color:#555;margin-top:6px;font-size:10px">🔗 클릭 → 관련 페이지</div>`;
      tt.style.display = 'block';
      tt.style.left = (e.clientX + 14) + 'px';
      tt.style.top  = (e.clientY - 10) + 'px';
    } else {
      tt.style.display = 'none';
    }
  });
  canvas.addEventListener('click', () => {
    if (hoverIdx >= 0) window.open(KEYWORDS[hoverIdx].url, '_blank');
  });
  canvas.addEventListener('wheel', e => {
    zoom = Math.max(0.5, Math.min(2.2, zoom - e.deltaY * 0.001));
    e.preventDefault();
  }, { passive: false });
}

// ─── 시작 ─────────────────────────────────────────────────
loadData();
</script>
</body>
