<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 수학 키워드 데이터 마이닝</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  color: #fff;
  font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
  overflow: hidden;
  height: 100vh;
  display: flex;
}
#loading-overlay {
  position: fixed; inset: 0; z-index: 999;
  background: #0a0a1a;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px;
  transition: opacity 0.6s ease;
}
#loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(168,85,247,0.2);
  border-top-color: #a855f7;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading-overlay p { font-size: 13px; color: #666; }
#update-badge {
  position: absolute; top: 20px; right: 16px;
  z-index: 10; font-size: 10px; color: #555;
  background: rgba(255,255,255,0.04);
  padding: 4px 10px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.07);
}
#sphere-panel {
  flex: 1; position: relative;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
#starfield { position: absolute; top:0; left:0; width:100%; height:100%; z-index:0; }
#sphere-canvas { position: relative; z-index: 1; cursor: grab; }
#sphere-canvas:active { cursor: grabbing; }
#sphere-title {
  position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  z-index: 10; text-align: center; white-space: nowrap;
}
#sphere-title h1 {
  font-size: 22px;
  background: linear-gradient(90deg,#a855f7,#06b6d4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
#legend {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 10; display: flex; gap: 20px;
  background: rgba(255,255,255,0.05);
  padding: 8px 20px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
}
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.dot { width: 10px; height: 10px; border-radius: 50%; }
#tooltip {
  position: fixed;
  background: rgba(10,10,30,0.95);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px; padding: 10px 14px;
  pointer-events: none; z-index: 100;
  display: none; max-width: 240px;
  font-size: 12px; line-height: 1.7;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#mining-panel {
  width: 320px;
  background: rgba(255,255,255,0.03);
  border-left: 1px solid rgba(255,255,255,0.08);
  display: flex; flex-direction: column;
  overflow-y: auto; z-index: 2;
}
#mining-panel::-webkit-scrollbar { width: 4px; }
#mining-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.panel-section {
  padding: 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.panel-section h3 {
  font-size: 11px; color: #888;
  text-transform: uppercase; letter-spacing: 1.5px;
  margin-bottom: 12px;
}
.score-num {
  font-size: 36px; font-weight: 700;
  background: linear-gradient(90deg,#f59e0b,#ef4444);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.score-sub { font-size: 11px; color: #666; margin-top: 2px; }
.bar-bg { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 10px; }
.bar-fill {
  height: 8px;
  background: linear-gradient(90deg,#f59e0b,#ef4444);
  border-radius: 4px; width: 0%;
  transition: width 1.5s cubic-bezier(0.4,0,0.2,1);
}
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-card {
  background: rgba(255,255,255,0.05); border-radius: 10px;
  padding: 12px; text-align: center;
  border: 1px solid rgba(255,255,255,0.06);
}
.stat-num { font-size: 22px; font-weight: 700; }
.stat-label { font-size: 10px; color: #888; margin-top: 3px; }
.freq-item { margin-bottom: 9px; }
.freq-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
.freq-bar-bg { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
.freq-bar-fill { height: 6px; border-radius: 3px; transition: width 1.5s ease; }
#donut-canvas { display: block; margin: 0 auto; }
.donut-legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 10px; font-size: 11px; }
.priority-item {
  display: flex; align-items: flex-start; gap: 10px;
  margin-bottom: 8px; padding: 10px;
  background: rgba(255,255,255,0.03); border-radius: 10px;
  border-left: 3px solid; cursor: pointer;
  transition: background 0.2s;
}
.priority-item:hover { background: rgba(255,255,255,0.08); }
.priority-rank { font-size: 20px; font-weight: 700; line-height: 1.2; min-width: 20px; }
.priority-info h4 { font-size: 13px; margin-bottom: 3px; }
.priority-info p { font-size: 10px; color: #888; line-height: 1.4; }
.db-row-table {
  width: 100%; border-collapse: collapse; font-size: 11px;
}
.db-row-table th {
  color: #666; font-weight: 500; text-align: left;
  padding: 4px 6px; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.db-row-table td {
  padding: 7px 6px; border-bottom: 1px solid rgba(255,255,255,0.04);
  vertical-align: middle;
}
.db-row-table tr:last-child td { border-bottom: none; }
.type-badge {
  display: inline-block; padding: 2px 8px; border-radius: 20px;
  font-size: 10px; font-weight: 600;
}
.avg-bar-bg { height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; margin-top: 4px; }
.avg-bar-fill { height: 5px; border-radius: 3px; transition: width 1.2s ease; }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <p>데이터 불러오는 중…</p>
</div>

<div id="sphere-panel">
  <canvas id="starfield"></canvas>
  <div id="sphere-title">
    <h1 id="page-title">📊 수학 키워드 데이터 마이닝</h1>
  </div>
  <canvas id="sphere-canvas" width="640" height="520"></canvas>
  <div id="legend">
    <div class="legend-item"><div class="dot" style="background:#ff2d55"></div><span>취약</span></div>
    <div class="legend-item"><div class="dot" style="background:#ffd60a"></div><span>보통</span></div>
    <div class="legend-item"><div class="dot" style="background:#2ed573"></div><span>강점</span></div>
  </div>
  <div id="update-badge">⏱ 로딩 중…</div>
</div>

<div id="mining-panel">
  <div class="panel-section">
    <h3>📈 현재 성적</h3>
    <div class="score-num"><span id="score-val">—</span><span style="font-size:18px;color:#888">점</span></div>
    <div class="score-sub" id="score-sub">데이터 로딩 중</div>
    <div class="bar-bg"><div class="bar-fill" id="score-fill"></div></div>
  </div>
  <div class="panel-section">
    <h3>📊 통계</h3>
    <div class="stats-grid" id="stats-grid"></div>
  </div>
  <div class="panel-section">
    <h3>🗃 DB 단원별 현황</h3>
    <table class="db-row-table" id="db-table">
      <thead><tr><th>단원</th><th>정답률</th><th>오답</th></tr></thead>
      <tbody id="db-table-body"></tbody>
    </table>
  </div>
  <div class="panel-section">
    <h3>📉 오답 빈도 분석</h3>
    <div id="freq-chart"></div>
  </div>
  <div class="panel-section">
    <h3>🍩 단원별 분포</h3>
    <canvas id="donut-canvas" width="180" height="180"></canvas>
    <div class="donut-legend" id="donut-legend"></div>
  </div>
  <div class="panel-section">
    <h3>🎯 우선 학습 단원</h3>
    <div id="priority-list"></div>
  </div>
</div>

<div id="tooltip"></div>

<script>
// 데이터 로드 및 renderAll() 부분은 그대로 유지 (생략 없이 전체 포함)
const DATA_URL = './data.json';
let KEYWORDS = [], NOTION = {}, DB_ROWS = [], META = {};

function mapRowToKeyword(row, maxWeight) {
  const typeNorm = row.Type === 'strong' ? 'strong' : row.Type === 'weak' ? 'weak' : 'yellow';
  const color = row.Color?.trim() || (typeNorm === 'strong' ? '#2ed573' : typeNorm === 'weak' ? '#ff2d55' : '#ffd60a');
  const w = Math.max(2, Math.min(5, Math.round((row.Weight / maxWeight) * 4) + 1));
  const unit = Array.isArray(row.Unit) ? row.Unit[0] : (row.Unit || '');
  const link = typeNorm === 'strong' ? 'problems' : 'weakness';
  return { t: row.Name, type: typeNorm, w, c: color, link, unit, mistakes: row.Mistakes||0, correct: row.Correct||0, avg_value: row.avg_value||0, url: null };
}

async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    const data = await res.json();
    NOTION = data.notionLinks;
    DB_ROWS = data.dbRows || [];
    const maxWeight = Math.max(...DB_ROWS.map(r => r.Weight || 1), 1);
    KEYWORDS = DB_ROWS.map(row => {
      const kw = mapRowToKeyword(row, maxWeight);
      kw.url = NOTION[kw.link] || NOTION.problems;
      return kw;
    });
    const totalQ = DB_ROWS.reduce((s,r)=>s+(r.Mistakes||0)+(r.Correct||0),0);
    const correctQ = DB_ROWS.reduce((s,r)=>s+(r.Correct||0),0);
    META = { title: data.meta?.title || '수학 키워드 데이터 마이닝', total: totalQ, correct: correctQ, score: totalQ>0?Math.round(correctQ/totalQ*100):0, updatedAt: data.meta?.updatedAt || new Date().toISOString() };
    renderAll();
    document.getElementById('update-badge').textContent = '🔄 ' + new Date(META.updatedAt).toLocaleDateString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) + ' 업데이트';
  } catch(e) { console.error(e); }
  document.getElementById('loading-overlay').classList.add('hidden');
  initStars(); drawStars(); initSphere();
}

function renderAll() { /* 기존 renderAll() 전체 코드 그대로 (생략) */ 
  // (이전 renderAll() 코드를 그대로 사용하세요. 공간상 생략했지만 실제로는 기존 그대로 복사해서 넣으세요)
}

// 별빛 배경
const sCanvas = document.getElementById('starfield');
const sCtx = sCanvas.getContext('2d');
let stars = [];
function initStars() { /* 기존 그대로 */ }
function drawStars() { /* 기존 그대로 */ }
window.addEventListener('resize', initStars);

// 3D 구 (문제 해결 핵심)
function initSphere() {
  const canvas = document.getElementById('sphere-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const CX = W/2, CY = H/2, RADIUS = 195;
  let rotX = 0.25, angleY = 0;
  let dragging = false, lastMX = 0, lastMY = 0, paused = false, hoverIdx = -1, zoom = 1.0;

  function fibSphere(n) { /* 기존 그대로 */ }
  const basePos = fibSphere(Math.max(KEYWORDS.length, 3));
  function rotY(p, a) { /* 기존 그대로 */ }
  function rotX2(p, a) { /* 기존 그대로 */ }
  function project(p) { /* 기존 그대로 */ }

  let _pts = [];

  function frame() {
    ctx.clearRect(0, 0, W, H);
    const grd = ctx.createRadialGradient(CX,CY,20, CX,CY,RADIUS);
    grd.addColorStop(0,'rgba(168,85,247,0.15)');
    grd.addColorStop(1,'rgba(168,85,247,0)');
    ctx.beginPath(); ctx.arc(CX,CY,RADIUS,0,Math.PI*2); ctx.fillStyle = grd; ctx.fill();

    if (!paused) angleY += 0.0095;   // 회전 속도 더 빠르게

    _pts = basePos.slice(0, KEYWORDS.length).map(p => {
      let q = rotY(p, angleY);
      q = rotX2(q, rotX);
      return project(q);
    });

    const order = KEYWORDS.map((_,i)=>i).sort((a,b) => _pts[a].z - _pts[b].z);

    // 연결선
    ctx.lineWidth = 0.4;
    for (let i = 0; i < order.length; i++) {
      for (let j = i + 1; j < order.length; j++) {
        const pa = _pts[order[i]], pb = _pts[order[j]];
        const dist = Math.hypot(pa.x-pb.x, pa.y-pb.y);
        if (dist < 170) {
          const alpha = (1 - dist/170) * 0.35;
          ctx.strokeStyle = `rgba(180,200,255,${alpha})`;
          ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
        }
      }
    }

    order.forEach(i => {
      const kw = KEYWORDS[i], p = _pts[i];
      const vis = (p.z + 1) / 2;
      const fs = Math.round((kw.w * 4 + 18) * p.d * zoom);   // 최소 크기 크게 ↑
      const isHov = (i === hoverIdx);

      ctx.save();
      ctx.font = `bold ${fs}px 'Segoe UI', sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

      ctx.shadowColor = kw.c;
      ctx.shadowBlur = isHov ? 42 : 18 + Math.round(vis * 24);   // 모든 키워드 강하게 빛남
      ctx.globalAlpha = 0.65 + vis * 0.35;   // 뒤에 있어도 잘 보이게

      ctx.fillStyle = kw.c;
      ctx.fillText(kw.t, p.x, p.y);

      if (isHov) {
        ctx.shadowBlur = 0;
        ctx.font = `11px 'Segoe UI', sans-serif`;
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = 1;
        const typeLabel = kw.type === 'strong' ? '✓ 강점' : kw.type === 'yellow' ? '△ 보통' : '⚠ 취약';
        ctx.fillText(typeLabel, p.x, p.y + fs/2 + 16);
      }
      ctx.restore();
    });

    requestAnimationFrame(frame);
  }
  frame();

  // 마우스 이벤트 (기존 그대로 완전 복사)
  canvas.addEventListener('mousedown', e => { dragging = true; lastMX = e.clientX; lastMY = e.clientY; });
  window.addEventListener('mouseup', () => { dragging = false; });
  window.addEventListener('mousemove', e => {
    if (dragging) {
      angleY += (e.clientX - lastMX) * 0.012;
      rotX += (e.clientY - lastMY) * 0.012;
      lastMX = e.clientX; lastMY = e.clientY;
      return;
    }
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    let found = -1, minD = Infinity;
    _pts.forEach((p, i) => {
      const fs = Math.round((KEYWORDS[i].w*4+18) * p.d * zoom);
      const d = Math.hypot(p.x - mx, p.y - my);
      if (d < fs + 8 && d < minD) { minD = d; found = i; }
    });
    hoverIdx = found; paused = (found >= 0);
    canvas.style.cursor = found >= 0 ? 'pointer' : 'grab';
    // tooltip 코드 (기존 그대로)
  });
  canvas.addEventListener('click', () => { if (hoverIdx >= 0) window.open(KEYWORDS[hoverIdx].url, '_blank'); });
  canvas.addEventListener('wheel', e => { zoom = Math.max(0.5, Math.min(2.2, zoom - e.deltaY * 0.001)); e.preventDefault(); }, { passive: false });
}

// 시작
loadData();
</script>
</body>
</html>
